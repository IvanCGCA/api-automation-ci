name: API Automation CI

on:
  push:
    branches: [ main ]  
jobs:
  run-tests:
    runs-on: ubuntu-latest  

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar librerias
      run: |
        pip install -r requirements.txt

    - name: Correr pruebas
      run: |
        pytest